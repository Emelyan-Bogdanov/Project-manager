    <!-- create compos -->
    <script>
      let myapp = new Vue({
        el: "#app",
        data: {
          userCount: 0,
        },

        mounted() {
          fetch("http://127.0.0.1:8080/howmanyusers")
            .then((response) => response.text())
            .then((data) => {
              this.userCount = data;
            })
            .catch((error) => {
              console.error("Error fetching users:", error);
            });
        },
      });
    </script>
    <script>
