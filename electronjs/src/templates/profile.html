<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profil</title>
    <link rel="stylesheet" href="../assets/css/all.css" />
    <link rel="stylesheet" href="../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="../assets/css/myframework.css" />
    <link rel="stylesheet" href="../assets/css/profile.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <button onclick="window.history.back()" class="gohome btn custom-orange d-flex align-items-center justify-content-center shadow-lg clicked">
      <i class="bi bi-arrow-left me-2"></i> Retour
    </button>

    <div class="profile-page" id="app">
      <div class="profile-header">
        <div class="profile-cover"></div>
        <div class="profile-info-row">
          <img src="https://i.pravatar.cc/120?img=1" alt="" class="profile-avatar" />
          <div class="profile-details">
            <h1 class="profile-name">{{ user.name }}</h1>
            <p class="profile-role">{{ user.role }}</p>
            <p class="profile-location">
              <i class="bi bi-geo-alt"></i> {{ user.location }}
            </p>
          </div>
          <button class="edit-profile-btn clicked">
            <i class="bi bi-pencil"></i> Modifier
          </button>
        </div>
      </div>

      <div class="profile-body">
        <div class="profile-section">
          <h5>À propos</h5>
          <p>{{ user.bio }}</p>
        </div>

        <div class="profile-section">
          <h5>Compétences</h5>
          <div class="skill-tags">
            <span class="skill-tag" v-for="skill in user.skills" :key="skill">{{ skill }}</span>
          </div>
        </div>

        <div class="profile-section">
          <h5>Activité récente</h5>
          <div class="profile-activity">
            <activity-item
              v-for="act in user.activity"
              :key="act.text"
              :icon="act.icon"
              :user="act.user"
              :action="act.text"
              :time="act.time"
              :avatar="''"
            ></activity-item>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="../assets/compos/activity-item.js"></script>
    <script>
      new Vue({
        el: "#app",
        data: {
          user: {
            name: "Alice Martin",
            role: "Chef de projet",
            location: "Paris, France",
            bio: "Passionnée par la gestion de projets et le développement d'applications. Experte en méthodologies agiles et coordination d'équipes.",
            skills: ["Gestion de projet", "Agile", "JavaScript", "UI/UX Design", "Communication"],
            activity: [
              { icon: "bi-check2-circle", user: "", text: "A terminé la tâche 'Page d'accueil'", time: "2h" },
              { icon: "bi-plus-circle", user: "", text: "A créé le projet 'Site Vitrine'", time: "1j" },
              { icon: "bi-chat", user: "", text: "A commenté sur la tâche #15", time: "2j" },
              { icon: "bi-person-plus", user: "", text: "A rejoint l'équipe 'Dashboard'", time: "3j" },
            ],
          },
        },
      });
    </script>
  </body>
</html>
