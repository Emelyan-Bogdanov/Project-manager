<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <link rel="stylesheet" href="../../assets/css/all.css" />
    <link rel="stylesheet" href="../../assets/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <style>
        body {
            background: linear-gradient(135deg, #171922 0%, #2d2f36 100%);
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 400px;
        }
        .auth-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .auth-logo .logo-circle {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #ff8c2f;
            box-shadow: 0 0 0 4px rgba(255, 140, 47, 0.15), 0 0 0 8px rgba(255, 140, 47, 0.08);
        }
        .auth-logo h4 {
            margin: 0;
            font-weight: 700;
            color: #1d2340;
        }
        .auth-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1d2340;
        }
        .auth-subtitle {
            color: #7b7d85;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border 0.2s;
            box-sizing: border-box;
        }
        .form-group input:focus {
            border-color: #ff9838;
        }
        .remember-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .remember-row input {
            width: 16px;
            height: 16px;
            accent-color: #ff9838;
            margin: 0;
        }
        .remember-row label {
            font-size: 14px;
            color: #555;
            margin: 0;
            cursor: pointer;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: #ff9838;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #e8882e;
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            color: #e74c3c;
            font-size: 13px;
            margin-bottom: 12px;
            display: none;
        }
        .error-msg.show {
            display: block;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #7b7d85;
        }
        .auth-footer a {
            color: #ff9838;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="auth-container" id="app">
        <div class="auth-logo">
            <div class="logo-circle"></div>
            <h4>ProjectManager</h4>
        </div>
        <div class="auth-title">Connexion</div>
        <div class="auth-subtitle">Connectez-vous pour accéder à votre espace</div>

        <div class="error-msg" :class="{ show: error }">{{ error }}</div>

        <form @submit.prevent="login">
            <div class="form-group">
                <label for="username">Nom d'utilisateur</label>
                <input type="text" id="username" v-model="username" placeholder="Entrez votre nom d'utilisateur" required />
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" v-model="password" placeholder="Entrez votre mot de passe" required />
            </div>
            <div class="remember-row">
                <input type="checkbox" id="rememberMe" v-model="rememberMe" />
                <label for="rememberMe">Se souvenir de moi</label>
            </div>
            <button type="submit" class="btn-login" :disabled="loading">
                <span v-if="loading">Connexion...</span>
                <span v-else>Se connecter</span>
            </button>
        </form>

        <div class="auth-footer">
            Pas encore de compte ? <a href="sign.html">Créer un compte</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script>
        new Vue({
            el: "#app",
            data: {
                username: "",
                password: "",
                rememberMe: true,
                loading: false,
                error: "",
            },
            methods: {
                async login() {
                    if (!this.username || !this.password) {
                        this.error = "Veuillez remplir tous les champs";
                        return;
                    }
                    this.loading = true;
                    this.error = "";
                    try {
                        const result = await window.electronAPI.login({
                            username: this.username,
                            password: this.password,
                            rememberMe: this.rememberMe,
                        });
                        if (result.success) {
                            window.electronAPI.navigate("src/templates/dashboard.html");
                        } else {
                            this.error = result.error || "Erreur de connexion";
                        }
                    } catch (err) {
                        this.error = "Erreur de connexion au serveur";
                    } finally {
                        this.loading = false;
                    }
                },
            },
        });
    </script>
</body>
</html>
